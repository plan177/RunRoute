<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>RunRouteBot</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/lucide-static@0.263.1/font/lucide.min.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
                <h1>RunRoute</h1>
            </div>
        </header>

        <div class="tabs">
            <button class="tab active" data-tab="route">
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
                Маршрут
            </button>
            <button class="tab" data-tab="pace">
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
                Темп
            </button>
        </div>

        <div id="tab-route" class="tab-content">
            <div class="search-box">
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                    <input type="text" id="address-input" placeholder="Город, адрес или координаты..." autocomplete="off" />
                </div>
                <button id="search-btn" class="btn-search">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                </button>
                <div id="address-suggestions" class="suggestions hidden"></div>
            </div>
            <div id="location-status" class="status"></div>

            <div class="mode-section">
                <button class="mode-btn active" data-mode="auto">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14"/>
                        <path d="m12 5 7 7-7 7"/>
                    </svg>
                    Авто
                </button>
                <button class="mode-btn" data-mode="manual">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 19V5"/>
                        <path d="m5 12 7-7 7 7"/>
                    </svg>
                    Вручную
                </button>
            </div>

            <div id="auto-controls" class="controls-panel">
                <div class="distance-chips">
                    <button class="chip" data-distance="1">1</button>
                    <button class="chip" data-distance="3">3</button>
                    <button class="chip active" data-distance="5">5</button>
                    <button class="chip" data-distance="10">10</button>
                    <button class="chip" data-distance="15">15</button>
                    <button class="chip" data-distance="21.1">21.1</button>
                    <button class="chip" data-distance="42.2">42.2</button>
                    <span class="chip-label">км</span>
                </div>
                <div id="hint-auto" class="hint">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 10l-4 4l6 6l4-16l-18 7l4 2l2 6l3-4"/>
                    </svg>
                    Нажмите на карту для точки старта
                </div>
            </div>

            <div id="manual-controls" class="controls-panel hidden">
                <div class="manual-toolbar">
                    <div class="manual-count">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 8v4l3 3"/>
                        </svg>
                        <span id="manual-count-text">0 точек</span>
                    </div>
                    <div class="manual-actions">
                        <button id="close-route-btn" class="btn-icon hidden" title="Замкнуть">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                            </svg>
                        </button>
                        <button id="undo-manual-btn" class="btn-icon" title="Отменить">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 7v6h6"/>
                                <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>
                            </svg>
                        </button>
                        <button id="clear-manual-btn" class="btn-icon danger" title="Очистить">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 6h18"/>
                                <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
                                <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div id="hint-manual" class="hint hidden">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 16v-4"/>
                        <path d="M12 8h.01"/>
                    </svg>
                    Добавляйте точки на карту
                </div>
            </div>

            <div class="action-buttons">
                <button id="generate-btn" class="btn-primary" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="3 11 22 2 13 21 11 13 3 11"/>
                    </svg>
                    Построить маршрут
                </button>
                <div class="btn-row">
                    <button id="regenerate-btn" class="btn-secondary hidden">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
                            <path d="M21 3v5h-5"/>
                            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
                            <path d="M8 16H3v5"/>
                        </svg>
                        Заново
                    </button>
                    <button id="download-btn" class="btn-accent hidden">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        GPX
                    </button>
                </div>
                <div class="btn-row hidden" id="share-row">
                    <button id="share-btn" class="btn-share">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
                            <polyline points="16 6 12 2 8 6"/>
                            <line x1="12" y1="2" x2="12" y2="15"/>
                        </svg>
                        Поделиться
                    </button>
                </div>
                <div id="share-toast" class="toast hidden"></div>
            </div>
        </div>

        <div id="tab-pace" class="tab-content hidden">
            <div class="pace-card">
                <div class="pace-section">
                    <label class="section-label">Дистанция</label>
                    <div class="distance-inputs">
                        <input type="number" id="pace-dist-km" min="0" max="100" value="5" class="num-input" />
                        <span class="num-sep">км</span>
                        <input type="number" id="pace-dist-m" min="0" max="900" step="100" value="0" class="num-input" />
                        <span class="num-sep">м</span>
                    </div>
                    <div class="distance-chips">
                        <button class="chip" data-dist="1000">1 км</button>
                        <button class="chip" data-dist="3000">3 км</button>
                        <button class="chip active" data-dist="5000">5 км</button>
                        <button class="chip" data-dist="10000">10 км</button>
                        <button class="chip" data-dist="21097">Полумарафон</button>
                        <button class="chip" data-dist="42195">Марафон</button>
                    </div>
                </div>

                <div class="pace-section">
                    <label class="section-label">Результат</label>
                    <div class="time-inputs">
                        <input type="number" id="pace-h" min="0" max="10" value="0" class="num-input" />
                        <span class="num-sep">ч</span>
                        <input type="number" id="pace-m" min="0" max="59" value="25" class="num-input" />
                        <span class="num-sep">мин</span>
                        <input type="number" id="pace-s" min="0" max="59" value="0" class="num-input" />
                        <span class="num-sep">сек</span>
                    </div>
                </div>

                <div class="metrics-grid">
                    <div class="metric-card">
                        <span class="metric-label">Темп</span>
                        <span id="result-pace" class="metric-value">5:00</span>
                        <span class="metric-unit">мин/км</span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">Скорость</span>
                        <span id="result-speed" class="metric-value">12.0</span>
                        <span class="metric-unit">км/ч</span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">Время на <span id="lap-label">400м</span></span>
                        <span id="result-lap" class="metric-value">2:00</span>
                        <span class="metric-unit">мин</span>
                        <div class="lap-tabs">
                            <button class="lap-tab" data-lap="200">200</button>
                            <button class="lap-tab active" data-lap="400">400</button>
                            <button class="lap-tab" data-lap="800">800</button>
                        </div>
                    </div>
                </div>

                <div id="splits-container" class="splits-section"></div>
            </div>
        </div>

        <div id="map" class="map"></div>

        <div id="route-info" class="route-stats hidden">
            <div class="stat">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6 6 18"/>
                    <path d="m6 6 12 12"/>
                </svg>
                <div class="stat-info">
                    <span id="route-distance" class="stat-value">0 км</span>
                    <span class="stat-label">Дистанция</span>
                </div>
            </div>
            <div class="stat">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/>
                </svg>
                <div class="stat-info">
                    <span id="route-accuracy" class="stat-value">--</span>
                    <span class="stat-label">Точность</span>
                </div>
            </div>
        </div>
    </div>

    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <p id="confirm-text" class="modal-text"></p>
            <div class="modal-actions">
                <button id="confirm-yes" class="modal-btn primary">Да</button>
                <button id="confirm-no" class="modal-btn secondary">Нет</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
